<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUR3DRO</title>
  <link rel="icon" type="image/jpeg" href="images/fav.jpg" />
  <style>
    /* ── WEBSITE BY HOLLOWTEKKEN96141 -IG @everything_i_surrendered @2swords2 Swords2 words are swords ── */
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fdfdfb;
      color: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ── Floating wave title ── */
    #wave-title {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #wave-title span {
      display: inline-block;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #000;
      animation: wave 1.6s ease-in-out infinite;
    }

    #wave-title span:nth-child(1) { animation-delay: 0.00s; }
    #wave-title span:nth-child(2) { animation-delay: 0.12s; }
    #wave-title span:nth-child(3) { animation-delay: 0.24s; }
    #wave-title span:nth-child(4) { animation-delay: 0.36s; }
    #wave-title span:nth-child(5) { animation-delay: 0.48s; }
    #wave-title span:nth-child(6) { animation-delay: 0.60s; }
    #wave-title span:nth-child(7) { animation-delay: 0.72s; }

    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-18px); }
    }

    /* ── Main layout ── */
    #main {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      padding-top: 90px;
    }

    /* ── Left panel – GIF ── */
    #gif-panel {
      flex: 0 0 50%;
      width: 50%;
      height: 100%;
      overflow: hidden;
      border-right: 2px solid #ccc;
    }

    #gif-link {
      display: block;
      width: 100%;
      height: 100%;
    }

    #gif-link img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
    }

    /* ── Right panel – Video ── */
    #video-panel {
      flex: 0 0 50%;
      width: 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 20px;
      background: #fdfdfb;
    }

    #video-panel h2 {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #000;
    }

    /* iframe wrapper keeps 16:9 */
    #player-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
    }

    #player-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Mobile layout ── */
    @media (max-width: 768px) {
      html, body {
        overflow-y: auto;
        overflow-x: hidden;
      }

      #main {
        flex-direction: column;
        height: auto;
        padding-top: 5;
      }

      #gif-panel {
        flex: none;
        width: 100%;
        height: 70vh;
        border-right: none;
        border-bottom: 2px solid #fff;
      }

      #video-panel {
        flex: none;
        width: 100%;
        height: auto;
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
<!-- ── WEBSITE BY HOLLOWTEKKEN96141 -IG @everything_i_surrendered @2swords2 Swords2 words are swords ── -->
  <!-- ── Floating wave title ── -->
  <div id="wave-title">
    <span>P</span><span>U</span><span>R</span><span>3</span><span>D</span><span>R</span><span>O</span>
  </div>

  <!-- ── Main content ── -->
  <div id="main">

    <!-- Left: clickable GIF -->
    <div id="gif-panel">
      <a id="gif-link"
         href="https://www.bigcartel.com"
         target="_blank"
         rel="noopener noreferrer"
         title="Visit our BigCartel store">
        <img src="images/ezgif-51687f4ffe3f8b5c.gif" alt="PUR3DRO – click to shop" />
      </a>
    </div>

    <!-- Right: YouTube playlist embed -->
    <div id="video-panel">
      <h2><a href="https://www.youtube.com/playlist?list=PLD-EabPXLv9xm3YataYP7HeTcF44ekeC_" target="_blank" rel="noopener noreferrer" style="color:inherit;text-decoration:none;cursor:pointer;">Video Portfolio</a></h2>

      <div id="player-wrapper">
        <iframe
          src="https://www.youtube.com/embed/videoseries?list=PLD-EabPXLv9xm3YataYP7HeTcF44ekeC_&autoplay=1&rel=0"
          allow="autoplay; encrypted-media; fullscreen"
          allowfullscreen
          title="PUR3DRO Video Portfolio">
        </iframe>
      </div>
    </div>

  </div>

  <style>
    .floaty-three {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      font-weight: 900;
      color: #fff;
      opacity: 0;
      animation: fadeThree 4s ease-out forwards;
      font-family: 'Segoe UI', Arial, sans-serif;
      line-height: 1;
    }

    @keyframes fadeThree {
      0%   { opacity: 0.7; }
      100% { opacity: 0; }
    }

    .explosion {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 160px;
      height: 160px;
      transform: translate(-50%, -50%);
      image-rendering: auto;
    }
  </style>

  <script>
    // ── Floating "3" spawner ──
    function spawnThree() {
      const el = document.createElement('span');
      el.textContent = '3';
      el.className = 'floaty-three';

      const size = Math.random() * 60 + 8;          // 20px – 140px
      const x    = Math.random() * window.innerWidth;
      const y    = Math.random() * window.innerHeight;
      const rot  = Math.random() * 0 - 1;          // -180° – 180°
      const dur  = Math.random() * 4 + 1;              // 3s – 7s fade

      el.style.fontSize  = size + 'px';
      el.style.left      = x + 'px';
      el.style.top       = y + 'px';
      el.style.transform = `translate(-50%,-50%) rotate(${rot}deg)`;
      el.style.animationDuration = dur + 's';

      document.body.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000);

      // schedule next spawn between 300ms and 1800ms
      setTimeout(spawnThree, Math.random() * 150 + 30);
    }
    spawnThree();

    document.addEventListener('click', function (e) {
      const img = document.createElement('img');
      // Cache-bust so the GIF always restarts from frame 1
      img.src = 'images/explosion.gif?t=' + Date.now();
      img.className = 'explosion';
      img.style.left = e.clientX + 'px';
      img.style.top  = e.clientY + 'px';
      document.body.appendChild(img);
      setTimeout(() => img.remove(), 780);
    });
  </script>
</body>
</html>
