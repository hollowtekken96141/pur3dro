<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUR3DRO</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fdfdfb;
      color: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ── Floating wave title ── */
    #wave-title {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #wave-title span {
      display: inline-block;
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #000;
      animation: wave 4.0s ease-in-out infinite;
    }

    /* stagger each letter */
    #wave-title span:nth-child(1) { animation-delay: 0.00s; }
    #wave-title span:nth-child(2) { animation-delay: 0.12s; }
    #wave-title span:nth-child(3) { animation-delay: 0.24s; }
    #wave-title span:nth-child(4) { animation-delay: 0.36s; }
    #wave-title span:nth-child(5) { animation-delay: 0.48s; }
    #wave-title span:nth-child(6) { animation-delay: 0.60s; }
    #wave-title span:nth-child(7) { animation-delay: 0.72s; }

    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-18px); }
    }

    /* ── Main layout ── */
    #main {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      padding-top: 90px;
    }

    /* ── Left panel – GIF ── */
    #gif-panel {
      flex: 0 0 50%;
      width: 50%;
      height: 100%;
      overflow: hidden;
      border-right: 2px solid #ccc;
    }

    #gif-link {
      display: block;
      width: 100%;
      height: 100%;
    }

    #gif-link img {
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: block;
    }

    /* ── Right panel – Video ── */
    #video-panel {
      flex: 0 0 50%;
      width: 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 20px;
      background: #fff;
    }

    #video-panel h2 {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #000;
    }

    /* iframe wrapper keeps 16:9, fills available width */
    #player-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
    }

    #player-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Arrow controls ── */
    #controls {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .arrow-btn {
      background: none;
      border: 2px solid #000;
      color: #000;
      font-size: 1.6rem;
      width: 52px;
      height: 52px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    .arrow-btn:hover {
      background: #000;
      color: #fff;
    }

    #video-counter {
      font-size: 0.95rem;
      color: #333;
      letter-spacing: 0.06em;
    }

    /* ── Mobile layout ── */
    @media (max-width: 768px) {
      html, body {
        overflow-y: auto;
        overflow-x: hidden;
      }

      #main {
        flex-direction: column;
        height: auto;
        padding-top: 90px;
      }

      #gif-panel {
        flex: none;
        width: 100%;
        height: 50vh;
        border-right: none;
        border-bottom: 2px solid #ccc;
      }

      #video-panel {
        flex: none;
        width: 100%;
        height: auto;
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>

  <!-- ── Floating wave title ── -->
  <div id="wave-title">
    <span>P</span><span>U</span><span>R</span><span>3</span><span>D</span><span>R</span><span>O</span>
  </div>

  <!-- ── Main content ── -->
  <div id="main">

    <!-- Left: clickable GIF -->
    <div id="gif-panel">
      <a id="gif-link"
         href="https://www.bigcartel.com"
         target="_blank"
         rel="noopener noreferrer"
         title="Visit our BigCartel store">
        <img src="images/ezgif-51687f4ffe3f8b5c.gif" alt="PUR3DRO – click to shop" />
      </a>
    </div>

    <!-- Right: YouTube playlist -->
    <div id="video-panel">
      <h2>Video Portfolio</h2>

      <div id="player-wrapper">
        <iframe
          id="yt-iframe"
          src=""
          allow="autoplay; encrypted-media"
          allowfullscreen
          title="PUR3DRO Video Portfolio">
        </iframe>
      </div>

      <div id="controls">
        <button class="arrow-btn" id="btn-prev" title="Previous video">&#8592;</button>
        <span id="video-counter">1 / 1</span>
        <button class="arrow-btn" id="btn-next" title="Next video">&#8594;</button>
      </div>
    </div>

  </div>

  <script>
    const PLAYLIST_ID = 'PLD-EabPXLv9xm3YataYP7HeTcF44ekeC_';

    let player;
    let playlistItems = [];
    let currentIndex  = 0;

    const tag = document.createElement('script');
    tag.src   = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('yt-iframe', {
        height : '100%',
        width  : '100%',
        playerVars: {
          listType      : 'playlist',
          list          : PLAYLIST_ID,
          autoplay      : 1,
          mute          : 0,
          index         : 0,
          rel           : 0,
          modestbranding: 1,
          enablejsapi   : 1,
        },
        events: {
          onReady      : onPlayerReady,
          onStateChange: onPlayerStateChange,
        }
      });
    };

    function onPlayerReady(event) {
      setTimeout(loadPlaylistData, 1200);
      event.target.playVideo();
    }

    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.ENDED) {
        navigate(1);
      }
    }

    function loadPlaylistData() {
      try {
        const data = player.getPlaylist();
        if (data && data.length) {
          playlistItems = data;
          currentIndex  = player.getPlaylistIndex();
          updateCounter();
        } else {
          setTimeout(loadPlaylistData, 1500);
        }
      } catch (e) {
        setTimeout(loadPlaylistData, 1500);
      }
    }

    function navigate(direction) {
      if (!player) return;
      if (playlistItems.length > 0) {
        currentIndex = (currentIndex + direction + playlistItems.length) % playlistItems.length;
        player.playVideoAt(currentIndex);
        updateCounter();
      } else {
        if (direction > 0) player.nextVideo();
        else               player.previousVideo();
        setTimeout(() => {
          currentIndex = player.getPlaylistIndex();
          updateCounter();
        }, 800);
      }
    }

    function updateCounter() {
      const total = playlistItems.length || '?';
      const cur   = playlistItems.length ? currentIndex + 1 : '?';
      document.getElementById('video-counter').textContent = `${cur} / ${total}`;
    }

    document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
    document.getElementById('btn-next').addEventListener('click', () => navigate(1));
  </script>
</body>
</html>
